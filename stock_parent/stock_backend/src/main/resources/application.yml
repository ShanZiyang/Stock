## 项目相关配置
#ruoyi:
#  # 名称
#  name: RuoYi
#  # 版本
#  version: 3.8.5
#  # 版权年份
#  copyrightYear: 2023
#  # 实例演示开关
#  demoEnabled: true
#  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
#  profile: G:/开发/RuoYi-Vue-master/uploadPath
#  # 获取ip地址开关
#  addressEnabled: false
#  # 验证码类型 math 数组计算 char 字符验证
#  captchaType: math

# web定义
server:
  port: 8081
  servlet:
    encoding:
      charset: utf-8
      enabled: true
      force: true

spring:
#  # 配置mysql数据源
  datasource:
    druid:
##      username: root
##      password: root
#      url: jdbc:mysql://127.0.0.1:3306/stock_db?useUnicode=true&characterEncoding=UTF-8&allowMultiQueries=true&useSSL=false&serverTimezone=Asia/Shanghai
#      #      driver-class-name: com.mysql.cj.jdbc.Driver
      # 初始化时建立物理连接的个数。初始化发生在显示调用 init 方法，或者第一次 getConnection 时
      initialSize: 6
      # 最小连接池数量
      minIdle: 2
      # 最大连接池数量
      maxActive: 20
      # 获取连接时最大等待时间，单位毫秒。配置了 maxWait 之后，缺省启用公平锁，
      # 并发效率会有所下降，如果需要可以通过配置 useUnfairLock 属性为 true 使用非公平锁。
      maxWait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      timeBetweenEvictionRunsMillis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      minEvictableIdleTimeMillis: 300000
      # 用来检测连接是否有效的 sql 因数据库方言而差, 例如 oracle 应该写成 SELECT 1 FROM DUAL
      validationQuery: SELECT 1 FROM DUAL
      # 建议配置为 true，不影响性能，并且保证安全性。申请连接的时候检测，
      # 如果空闲时间大于 timeBetweenEvictionRunsMillis，执行 validationQuery 检测连接是否有效。
      testWhileIdle: true
      # 申请连接时执行 validationQuery 检测连接是否有效，做了这个配置会降低性能。
      testOnBorrow: false
      # 归还连接时执行 validationQuery 检测连接是否有效，做了这个配置会降低性能。
      testOnReturn: false
      # 是否自动回收超时连接
      poolPreparedStatements: true
      maxPoolPreparedStatementPerConnectionSize: 20
      # 配置监控统计拦截的filters，去掉后监控界面sql无法统计，'wall'用于防火墙
      filters: stat,wall,log4j
      # 通过connectProperties属性来打开mergeSql功能；慢SQL记录
      connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

  #配置redis环境
  redis:
    host: 127.0.0.1
    port: 6379
    database: 0 #Redis数据库索引（默认为0）
    lettuce:
      pool:
        max-active: 8 # 连接池最大连接数（使用负值表示没有限制）
        max-wait: -1ms # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-idle: 8 # 连接池中的最大空闲连接
        min-idle: 1  # 连接池中的最小空闲连接
    timeout: PT10S # 连接超时时间（毫秒）
  profiles:
    active: dev # 激活开发环境
  main:
    allow-bean-definition-overriding: true # 允许覆盖默认bean

  messages:
    basename: i18n/messages




# 配置mybatis
mybatis:
  type-aliases-package: com.ys.stock.pojo
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false #使全局的映射器启用或禁用缓存。
    lazy-loading-enabled: false #全局启用或禁用延迟加载。当禁用时，所有关联对象都会即时加载。
    aggressive-lazy-loading: true #当启用时，有延迟加载属性的对象在被调用时将会完全加载任意属性。否则，每种属性将会按需要加载。
  mapper-locations: classpath:mapper/*.xml
# pagehelper配置
pagehelper:
  helper-dialect: mysql #指定分页数据库类型（方言）
  reasonable: true #是否启用分页合理化，当pagenum< 1显示第一页，当pagenum > pages显示最后一页
  support-methods-arguments: true # 支持通过Mapper接口参数来传递分页参数，默认false
  params: pacount=countSql # POJO或者Map中发现了countSql属性，就会作为count参数使用
  returnPageInfo: check # always总是返回PageInfo类型,check检查返回类型是否为PageInfo,none返回Page

# 配置股票相关的参数
stock:
  inner: # A股
    - s_sh000001 # 上证ID
    - s_sz399001 #  深证ID
  outer: # 外盘
#    - int_dji # 道琼斯
#    - int_nasdaq # 纳斯达克
    - int_hangseng # 恒生
    - int_nikkei # 日经指数
#    - b_TWSE # 台湾加权
#    - b_FSSTI # 新加坡

  marketUrl: http://hq.sinajs.cn/list=  #大盘参数获取url
  blockUrl: http://vip.stock.finance.sina.com.cn/q/view/newSinaHy.php  #板块参数获取url

  upDownRange: #配置涨幅榜List集合区间
    - "<-7%"
    - "-7~-5%"
    - "-5~-3%"
    - "-3~0%"
    - "0~3%"
    - "3~5%"
    - "5~7%"
    - ">7%"

#配置xxljob 执行器名称 远程任务注册中心地址 内部心跳检查端口
xxl:
  job:
    accessToken:
    admin:
      addresses: http://127.0.0.1:8082/xxl-job-admin
    executor:
      appname: xiaoyang-stock-job-executor
      address:
      ip:
      port: 6666
      logpath: /joblog
      logretentiondays: 30

# 定时任务线程池基础参数
task:
  pool:
    corePoolSize: 5 # 核心线程数
    maxPoolSize: 20 # 设置最大线程数
    keepAliveSeconds: 300 # 设置线程活跃时间
    queueCapacity: 100 # 设置队列容量

oss:
  accessKey: YOUR_OSS_ACCESS_KEY
  secretKey: YOUR_OSS_SECRET_KEY
  bucket: YOUR_OSS_BUCKET


